<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レトロSF タイムトラベルカー ジェネレーター</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background: radial-gradient(circle at 50% 30%, #5a5f66 0%, #2c2f33 60%, #1a1c1e 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  #canvas-wrap { position:absolute; inset:0; }
  canvas { display:block; }

  #panel {
    position:absolute; top:16px; left:16px; z-index:10;
    background: rgba(20,22,24,0.78);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(120,255,240,0.25);
    border-radius: 12px;
    padding: 16px 18px;
    color: #e8f7f5;
    max-width: 300px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  #panel h1 {
    font-size: 15px;
    margin: 0 0 4px 0;
    letter-spacing: 0.02em;
    color: #7cf5e6;
  }
  #panel p {
    font-size: 12px;
    line-height: 1.6;
    color: #b9c4c2;
    margin: 0 0 12px 0;
  }
  .btn-row { display:flex; flex-direction:column; gap:8px; }
  button {
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid rgba(124,245,230,0.4);
    background: linear-gradient(180deg, rgba(124,245,230,0.16), rgba(124,245,230,0.04));
    color: #eafffa;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button:hover { background: rgba(124,245,230,0.28); }
  button:active { transform: scale(0.97); }

  #toggleRow {
    margin-top: 12px;
    display:flex;
    align-items:center;
    gap: 8px;
    font-size: 12px;
    color:#b9c4c2;
  }
  #status {
    margin-top: 10px;
    font-size: 11px;
    color: #7cf5e6;
    min-height: 14px;
  }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="panel">
  <h1>RETRO TIME-TRAVEL CAR — オリジナル 3Dモデル</h1>
  <p>参考画像の意匠（版権のあるタイムマシン改造車）はそのまま複製せず、同じ「レトロ近未来×タイムトラベル装備」のコンセプトでゼロから作ったオリジナルデザインです。ドラッグで回転、スクロールでズームできます。</p>
  <div class="btn-row">
    <button id="btnGLB">GLB形式でダウンロード（Web/ゲームエンジン向け）</button>
    <button id="btnOBJ">OBJ形式でダウンロード（汎用3Dソフト向け）</button>
    <button id="btnSTL">STL形式でダウンロード（3Dプリント向け）</button>
  </div>
  <div id="toggleRow">
    <input type="checkbox" id="autoRotate" checked>
    <label for="autoRotate">自動回転</label>
  </div>
  <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>

<script>
(function(){
  const wrap = document.getElementById('canvas-wrap');
  const statusEl = document.getElementById('status');

  // ---------- Renderer / Scene / Camera ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  wrap.appendChild(renderer.domElement);

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(6.2, 3.1, 6.8);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.65, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 3;
  controls.maxDistance = 20;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 3.2;

  document.getElementById('autoRotate').addEventListener('change', (e) => {
    controls.autoRotate = e.target.checked;
  });

  // ---------- Lighting ----------
  scene.add(new THREE.HemisphereLight(0xbfd6da, 0x1a1c1e, 0.7));
  const keyLight = new THREE.DirectionalLight(0xffffff, 1.1);
  keyLight.position.set(5, 8, 4);
  scene.add(keyLight);
  const rimLight = new THREE.DirectionalLight(0x7cf5e6, 0.5);
  rimLight.position.set(-6, 3, -5);
  scene.add(rimLight);
  scene.add(new THREE.AmbientLight(0x404040, 0.4));

  // ---------- Floor ----------
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2d30, roughness: 0.95, metalness: 0.0 });
  const floor = new THREE.Mesh(new THREE.CircleGeometry(14, 48), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.001;
  scene.add(floor);
  const grid = new THREE.GridHelper(28, 28, 0x4a5458, 0x33383b);
  scene.add(grid);

  // ---------- Materials ----------
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcfd2d6, metalness: 0.75, roughness: 0.28 });
  const darkTrimMat = new THREE.MeshStandardMaterial({ color: 0x131416, metalness: 0.3, roughness: 0.55 });
  const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x1c2a30, metalness: 0.1, roughness: 0.05, transparent: true, opacity: 0.45, transmission: 0.3 });
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x0d0d0d, roughness: 0.9, metalness: 0.1 });
  const hubMat = new THREE.MeshStandardMaterial({ color: 0xd8dadd, metalness: 0.8, roughness: 0.3 });
  const glowCyanMat = new THREE.MeshStandardMaterial({ color: 0x0e2a29, emissive: 0x6dfff0, emissiveIntensity: 1.6, roughness: 0.4 });
  const glowAmberMat = new THREE.MeshStandardMaterial({ color: 0x2a1a08, emissive: 0xffa64d, emissiveIntensity: 1.2, roughness: 0.4 });
  const ventMat = new THREE.MeshStandardMaterial({ color: 0x3a3d40, metalness: 0.6, roughness: 0.4 });

  // ---------- Car root group (this is what gets exported) ----------
  const car = new THREE.Group();
  car.name = "RetroTimeTravelCar";
  scene.add(car);

  const CAR_WIDTH = 1.9;

  // Main body: wedge silhouette, drawn in XY, extruded along Z (width)
  function makeBodyShape() {
    const s = new THREE.Shape();
    s.moveTo(-2.15, 0.16);
    s.lineTo(-2.20, 0.55);
    s.lineTo(-1.85, 0.62);
    s.lineTo(-1.35, 0.78);
    s.lineTo(-1.05, 0.95);
    s.lineTo(-0.55, 1.14);
    s.lineTo(0.35, 1.14);
    s.lineTo(0.85, 0.92);
    s.lineTo(1.15, 0.72);
    s.lineTo(1.65, 0.58);
    s.lineTo(2.10, 0.50);
    s.lineTo(2.18, 0.16);
    s.lineTo(2.18, 0.10);
    s.lineTo(-2.15, 0.10);
    s.lineTo(-2.15, 0.16);
    return s;
  }

  const bodyGeo = new THREE.ExtrudeGeometry(makeBodyShape(), { depth: CAR_WIDTH, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2 });
  bodyGeo.translate(0, 0, -CAR_WIDTH / 2);
  const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
  car.add(bodyMesh);

  // Lower rocker / skirt trim
  function makeSkirtShape() {
    const s = new THREE.Shape();
    s.moveTo(-2.05, 0.10);
    s.lineTo(2.08, 0.10);
    s.lineTo(2.08, 0.02);
    s.lineTo(-2.05, 0.02);
    s.lineTo(-2.05, 0.10);
    return s;
  }
  const skirtGeo = new THREE.ExtrudeGeometry(makeSkirtShape(), { depth: CAR_WIDTH + 0.04, bevelEnabled: false });
  skirtGeo.translate(0, 0, -(CAR_WIDTH + 0.04) / 2);
  car.add(new THREE.Mesh(skirtGeo, darkTrimMat));

  // Glass canopy band
  function makeGlassShape() {
    const s = new THREE.Shape();
    s.moveTo(-1.02, 0.94);
    s.lineTo(-0.52, 1.11);
    s.lineTo(0.32, 1.11);
    s.lineTo(0.80, 0.91);
    s.lineTo(0.60, 0.85);
    s.lineTo(0.28, 1.00);
    s.lineTo(-0.48, 1.00);
    s.lineTo(-0.86, 0.86);
    s.lineTo(-1.02, 0.94);
    return s;
  }
  const glassGeo = new THREE.ExtrudeGeometry(makeGlassShape(), { depth: CAR_WIDTH - 0.06, bevelEnabled: false });
  glassGeo.translate(0, 0.01, -(CAR_WIDTH - 0.06) / 2);
  car.add(new THREE.Mesh(glassGeo, glassMat));

  // ---------- Wheels ----------
  function buildWheel(x, z) {
    const g = new THREE.Group();
    const radius = 0.34, thickness = 0.24;
    const tireGeo = new THREE.CylinderGeometry(radius, radius, thickness, 20);
    tireGeo.rotateX(Math.PI / 2);
    const tire = new THREE.Mesh(tireGeo, wheelMat);
    g.add(tire);
    const hubGeo = new THREE.CylinderGeometry(radius * 0.6, radius * 0.6, thickness + 0.02, 8);
    hubGeo.rotateX(Math.PI / 2);
    const hub = new THREE.Mesh(hubGeo, hubMat);
    g.add(hub);
    g.position.set(x, radius, z);
    return g;
  }
  const wheelZ = CAR_WIDTH / 2 + 0.02;
  car.add(buildWheel(-1.45, wheelZ));
  car.add(buildWheel(-1.45, -wheelZ));
  car.add(buildWheel(1.5, wheelZ));
  car.add(buildWheel(1.5, -wheelZ));

  // ---------- Front glow strip + headlights ----------
  const frontStripGeo = new THREE.BoxGeometry(0.06, 0.09, 1.5);
  const frontStrip = new THREE.Mesh(frontStripGeo, glowCyanMat);
  frontStrip.position.set(2.19, 0.42, 0);
  car.add(frontStrip);

  [-0.55, -0.2, 0.2, 0.55].forEach((zOff) => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.14), hubMat);
    hl.position.set(2.20, 0.62, zOff);
    car.add(hl);
  });

  // ---------- Rear light bar ----------
  const rearBarGeo = new THREE.BoxGeometry(0.06, 0.14, 1.6);
  const rearBar = new THREE.Mesh(rearBarGeo, glowAmberMat);
  rearBar.position.set(-2.19, 0.5, 0);
  car.add(rearBar);

  // rear plate (generic, non-trademarked text)
  const plateCanvas = document.createElement('canvas');
  plateCanvas.width = 256; plateCanvas.height = 64;
  const ctx = plateCanvas.getContext('2d');
  ctx.fillStyle = '#101214'; ctx.fillRect(0, 0, 256, 64);
  ctx.fillStyle = '#7cf5e6'; ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('PROTO-01', 128, 34);
  const plateTex = new THREE.CanvasTexture(plateCanvas);
  const plateMat = new THREE.MeshStandardMaterial({ map: plateTex, emissive: 0x113330, emissiveMap: plateTex, emissiveIntensity: 0.6 });
  const plate = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.14), plateMat);
  plate.position.set(-2.205, 0.32, 0);
  plate.rotation.y = Math.PI / 2;
  car.add(plate);

  // ---------- Rear "temporal reactor" cluster (original design, not a flux-capacitor copy) ----------
  const reactor = new THREE.Group();
  const coreGeo = new THREE.CylinderGeometry(0.22, 0.26, 0.5, 6);
  const core = new THREE.Mesh(coreGeo, ventMat);
  core.position.set(0, 0.25, 0);
  reactor.add(core);
  const ringGeo = new THREE.TorusGeometry(0.24, 0.035, 10, 24);
  const ring = new THREE.Mesh(ringGeo, glowCyanMat);
  ring.position.set(0, 0.55, 0);
  ring.rotation.x = Math.PI / 2;
  reactor.add(ring);
  const capGeo = new THREE.SphereGeometry(0.09, 12, 12);
  const cap = new THREE.Mesh(capGeo, glowCyanMat);
  cap.position.set(0, 0.72, 0);
  reactor.add(cap);
  // asymmetric side vent box, off-center to avoid mirroring known designs
  const ventBox = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.34, 0.22), ventMat);
  ventBox.position.set(-0.05, 0.2, 0.5);
  reactor.add(ventBox);
  for (let i = 0; i < 3; i++) {
    const slat = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.03, 0.02), darkTrimMat);
    slat.position.set(-0.05, 0.1 + i * 0.09, 0.62);
    reactor.add(slat);
  }
  reactor.position.set(-1.55, 0.62, 0);
  car.add(reactor);

  // ---------- Side energy conduit (stylized tube, distinct path) ----------
  function buildConduit(zSide) {
    const pts = [
      new THREE.Vector3(-1.9, 0.5, zSide),
      new THREE.Vector3(-1.55, 0.95, zSide),
      new THREE.Vector3(-0.6, 1.22, zSide),
      new THREE.Vector3(0.6, 1.22, zSide),
      new THREE.Vector3(1.35, 0.85, zSide),
      new THREE.Vector3(1.9, 0.55, zSide),
      new THREE.Vector3(2.15, 0.45, zSide * 0.55),
    ];
    const curve = new THREE.CatmullRomCurve3(pts);
    const tubeGeo = new THREE.TubeGeometry(curve, 48, 0.045, 8, false);
    return new THREE.Mesh(tubeGeo, glowCyanMat);
  }
  car.add(buildConduit(CAR_WIDTH / 2 + 0.06));
  car.add(buildConduit(-(CAR_WIDTH / 2 + 0.06)));

  // ---------- Roof sensor pod ----------
  const podGroup = new THREE.Group();
  const podBase = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.11, 0.12, 12), hubMat);
  podGroup.add(podBase);
  const podHead = new THREE.Mesh(new THREE.SphereGeometry(0.1, 14, 14), glowAmberMat);
  podHead.position.y = 0.16;
  podGroup.add(podHead);
  podGroup.position.set(-0.1, 1.24, 0);
  car.add(podGroup);

  // Center exhaust vents on rear deck (small, generic greeble)
  for (let i = -1; i <= 1; i += 2) {
    const vent = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.05, 0.5), ventMat);
    vent.position.set(-1.55, 0.85, i * 0.55);
    car.add(vent);
  }

  car.position.y = 0.02;

  // ---------- Resize ----------
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- Animate ----------
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ---------- Export helpers ----------
  const downloadLink = document.createElement('a');
  downloadLink.style.display = 'none';
  document.body.appendChild(downloadLink);

  function saveBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    downloadLink.href = url;
    downloadLink.download = filename;
    downloadLink.click();
    URL.revokeObjectURL(url);
    statusEl.textContent = filename + ' をダウンロードしました';
  }

  document.getElementById('btnGLB').addEventListener('click', () => {
    const exporter = new THREE.GLTFExporter();
    exporter.parse(
      car,
      (result) => {
        if (result instanceof ArrayBuffer) {
          saveBlob(new Blob([result], { type: 'application/octet-stream' }), 'time-travel-car.glb');
        } else {
          saveBlob(new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' }), 'time-travel-car.gltf');
        }
      },
      (err) => { statusEl.textContent = 'GLBエクスポートに失敗しました'; console.error(err); },
      { binary: true }
    );
  });

  document.getElementById('btnOBJ').addEventListener('click', () => {
    const exporter = new THREE.OBJExporter();
    const result = exporter.parse(car);
    saveBlob(new Blob([result], { type: 'text/plain' }), 'time-travel-car.obj');
  });

  document.getElementById('btnSTL').addEventListener('click', () => {
    const exporter = new THREE.STLExporter();
    const result = exporter.parse(car, { binary: false });
    saveBlob(new Blob([result], { type: 'text/plain' }), 'time-travel-car.stl');
  });
})();
</script>
</body>
</html>
