<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>6面画像から3Dモデル生成</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; max-width: 250px; }
    button, input, select { display: block; margin: 5px 0; width: 100%; box-sizing: border-box; }
    .face-btn { background: #444; color: white; border: 1px solid #888; cursor: pointer; }
    .face-btn.assigned { background: #2a6; }
    #progress-container { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 10px; text-align: center; width: 80%; max-width: 400px; }
    #progress-bar { width: 100%; background: #333; border-radius: 5px; overflow: hidden; }
    #progress-fill { height: 20px; width: 0%; background: #0af; transition: width 0.2s; }
    #progress-text { margin-top: 5px; font-size: 12px; }
    #preview-ui { position: absolute; top: 10px; right: 10px; display: none; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <h3>6面画像割り当て</h3>
    <button id="face-front" class="face-btn">Front (前)</button>
    <button id="face-back" class="face-btn">Back (後)</button>
    <button id="face-left" class="face-btn">Left (左)</button>
    <button id="face-right" class="face-btn">Right (右)</button>
    <button id="face-top" class="face-btn">Top (上)</button>
    <button id="face-bottom" class="face-btn">Bottom (下)</button>
    <label>背景色: <input type="color" id="bgcolor" value="#00ff00"></label>
    <label>許容値: <input type="range" id="tolerance" min="10" max="150" value="50"></label>
    <label>密度: 
      <select id="density">
        <option value="64" selected>低 (64³)</option>
        <option value="96">中 (96³)</option>
        <option value="128">高 (128³)</option>
      </select>
    </label>
    <button id="generate" disabled>Generate 3D Model</button>
  </div>
  <div id="progress-container">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-text"></div>
  </div>
  <div id="preview-ui">
    <button id="toggle-texture">テクスチャ切替</button>
    <button id="save-obj">OBJ保存</button>
    <button id="save-stl">STL保存</button>
    <button id="back-btn">戻る</button>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ---------- 状態管理 ----------
    const faces = ['front', 'back', 'left', 'right', 'top', 'bottom'];
    const images = { front: null, back: null, left: null, right: null, top: null, bottom: null };
    let textureAtlas = null;
    let showTexture = true;
    let previewRenderer = null;

    // ファイル入力（非表示）
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/png, image/jpeg';
    let pendingFace = null;

    // ---------- UI要素 ----------
    const uiPanel = document.getElementById('ui');
    const previewUi = document.getElementById('preview-ui');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const generateBtn = document.getElementById('generate');
    const bgColorPicker = document.getElementById('bgcolor');
    const toleranceSlider = document.getElementById('tolerance');
    const densitySelect = document.getElementById('density');

    // 面ボタン
    const faceBtns = {};
    faces.forEach(f => { faceBtns[f] = document.getElementById(`face-${f}`); });

    // ---------- Three.js セットアップ（立方体UI用） ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 10);
    camera.position.set(2, 2, 3);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // CSS2レンダラ（ラベル用）
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 立方体メッシュ
    const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
    const cubeMat = new THREE.MeshBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.5 });
    const cube = new THREE.Mesh(cubeGeo, cubeMat);
    const edges = new THREE.EdgesGeometry(cubeGeo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
    cube.add(line);
    scene.add(cube);

    // 面ラベル
    const labels = {
      front:  { pos: [0,0,0.5], text: '前' },
      back:   { pos: [0,0,-0.5], text: '後' },
      left:   { pos: [-0.5,0,0], text: '左' },
      right:  { pos: [0.5,0,0], text: '右' },
      top:    { pos: [0,0.5,0], text: '上' },
      bottom: { pos: [0,-0.5,0], text: '下' }
    };
    Object.entries(labels).forEach(([key, val]) => {
      const div = document.createElement('div');
      div.textContent = val.text;
      div.style.color = 'white';
      div.style.fontSize = '14px';
      div.style.background = 'rgba(0,0,0,0.7)';
      div.style.padding = '2px 5px';
      const label = new CSS2DObject(div);
      label.position.set(...val.pos);
      cube.add(label);
    });

    // レイキャスター（面選択）
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    window.addEventListener('click', onClickCube, false);

    function onClickCube(event) {
      if (event.target !== renderer.domElement) return;
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(cube);
      if (intersects.length > 0) {
        const point = intersects[0].point.clone();
        cube.worldToLocal(point);
        const face = getFaceFromPoint(point);
        if (face) {
          pendingFace = face;
          fileInput.click();
        }
      }
    }

    function getFaceFromPoint(localPoint) {
      const eps = 0.49;
      if (localPoint.z > eps) return 'front';
      if (localPoint.z < -eps) return 'back';
      if (localPoint.x < -eps) return 'left';
      if (localPoint.x > eps) return 'right';
      if (localPoint.y > eps) return 'top';
      if (localPoint.y < -eps) return 'bottom';
      return null;
    }

    fileInput.addEventListener('change', (e) => {
      if (!pendingFace) return;
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          images[pendingFace] = img;
          faceBtns[pendingFace].classList.add('assigned');
          faceBtns[pendingFace].textContent = `${pendingFace} ✓`;
          checkAllAssigned();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      fileInput.value = '';
    });

    faces.forEach(f => {
      faceBtns[f].addEventListener('click', () => {
        pendingFace = f;
        fileInput.click();
      });
    });

    function checkAllAssigned() {
      const all = faces.every(f => images[f] !== null);
      generateBtn.disabled = !all;
    }

    // ---------- アニメーションループ ----------
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------- ユーティリティ ----------
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // 進捗表示
    function updateProgress(percent, text) {
      progressFill.style.width = `${Math.min(100, percent)}%`;
      progressText.textContent = text;
    }

    // ---------- 画像処理・マスク ----------
    function getMask(image, bgColor, tolerance) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const maxSize = 512;
      let w = image.width, h = image.height;
      if (w > maxSize || h > maxSize) {
        const scale = Math.min(maxSize/w, maxSize/h);
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(image, 0, 0, w, h);
      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;
      const mask = new Uint8Array(w * h);
      const bgRGB = [parseInt(bgColor.slice(1,3),16), parseInt(bgColor.slice(3,5),16), parseInt(bgColor.slice(5,7),16)];
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const dist = Math.sqrt((r-bgRGB[0])**2 + (g-bgRGB[1])**2 + (b-bgRGB[2])**2);
        mask[i/4] = dist <= tolerance ? 0 : 1;
      }
      return { mask, width: w, height: h, canvas };
    }

    // ---------- Visual Hull（非同期スライス処理） ----------
    async function generateVoxelGridAsync(masks, size) {
      const grid = new Uint8Array(size*size*size);
      const s = size;
      const half = 0.5;

      function project(point, face) {
        let u, v;
        const maskData = masks[face];
        switch(face) {
          case 'front': u = point.x + half; v = point.y + half; break;
          case 'back':  u = -point.x + half; v = point.y + half; break;
          case 'left':  u = -point.z + half; v = point.y + half; break;
          case 'right': u = point.z + half; v = point.y + half; break;
          case 'top':   u = point.x + half; v = -point.z + half; break;
          case 'bottom': u = point.x + half; v = point.z + half; break;
        }
        const wImg = maskData.width, hImg = maskData.height;
        const px = Math.floor(u * (wImg-1));
        const py = Math.floor(v * (hImg-1));
        if (px < 0 || px >= wImg || py < 0 || py >= hImg) return false;
        return maskData.mask[py * wImg + px] === 1;
      }

      for (let z = 0; z < s; z++) {
        for (let y = 0; y < s; y++) {
          for (let x = 0; x < s; x++) {
            const cx = (x / (s-1)) - half;
            const cy = (y / (s-1)) - half;
            const cz = (z / (s-1)) - half;
            const point = new THREE.Vector3(cx, cy, cz);
            let inside = true;
            for (const f of faces) {
              if (!project(point, f)) { inside = false; break; }
            }
            if (inside) grid[z*s*s + y*s + x] = 1;
          }
        }
        // スライスごとにUI更新
        if (z % 4 === 0 || z === s-1) {
          const progress = 50 + (z / s) * 25;
          updateProgress(progress, `Voxel carving... ${Math.round(progress)}%`);
          await sleep(0); // 制御を戻す
        }
      }
      return grid;
    }

    // ---------- メッシュ生成（非同期スライス処理） ----------
    async function simpleMeshFromGridAsync(grid, size) {
      const vertices = [], faces = [];
      const s = size;
      const addQuad = (v0, v1, v2, v3) => {
        const idx = vertices.length;
        vertices.push(v0, v1, v2, v3);
        faces.push([idx, idx+1, idx+2], [idx, idx+2, idx+3]);
      };

      for (let z = 0; z < s; z++) {
        for (let y = 0; y < s; y++) {
          for (let x = 0; x < s; x++) {
            if (!grid[z*s*s + y*s + x]) continue;
            const x0 = (x/(s-1))-0.5, y0 = (y/(s-1))-0.5, z0 = (z/(s-1))-0.5;
            const x1 = x0 + 1/(s-1), y1 = y0 + 1/(s-1), z1 = z0 + 1/(s-1);
            const c = (a,b,c) => new THREE.Vector3(a,b,c);
            if (x===0 || !grid[z*s*s + y*s + (x-1)]) addQuad(c(x0,y0,z0),c(x0,y1,z0),c(x0,y1,z1),c(x0,y0,z1));
            if (x===s-1 || !grid[z*s*s + y*s + (x+1)]) addQuad(c(x1,y0,z1),c(x1,y1,z1),c(x1,y1,z0),c(x1,y0,z0));
            if (y===0 || !grid[z*s*s + (y-1)*s + x]) addQuad(c(x0,y0,z1),c(x1,y0,z1),c(x1,y0,z0),c(x0,y0,z0));
            if (y===s-1 || !grid[z*s*s + (y+1)*s + x]) addQuad(c(x0,y1,z0),c(x1,y1,z0),c(x1,y1,z1),c(x0,y1,z1));
            if (z===0 || !grid[(z-1)*s*s + y*s + x]) addQuad(c(x0,y0,z0),c(x1,y0,z0),c(x1,y1,z0),c(x0,y1,z0));
            if (z===s-1 || !grid[(z+1)*s*s + y*s + x]) addQuad(c(x0,y1,z1),c(x1,y1,z1),c(x1,y0,z1),c(x0,y0,z1));
          }
        }
        if (z % 4 === 0 || z === s-1) {
          const progress = 75 + (z / s) * 20;
          updateProgress(progress, `メッシュ生成中... ${Math.round(progress)}%`);
          await sleep(0);
        }
      }

      // 頂点の重複統合とジオメトリ構築
      const geo = new THREE.BufferGeometry();
      const posArray = [];
      const idxArray = [];
      const vertexMap = new Map();
      faces.forEach(([a,b,c]) => {
        [a,b,c].forEach(v => {
          const key = `${v.x.toFixed(6)},${v.y.toFixed(6)},${v.z.toFixed(6)}`;
          if (!vertexMap.has(key)) {
            vertexMap.set(key, posArray.length/3);
            posArray.push(v.x, v.y, v.z);
          }
          idxArray.push(vertexMap.get(key));
        });
      });
      geo.setAttribute('position', new THREE.Float32BufferAttribute(posArray, 3));
      geo.setIndex(idxArray);
      geo.computeVertexNormals();
      return geo;
    }

    // ---------- テクスチャアトラス ----------
    function createTextureAtlas(masks) {
      const atlasCanvas = document.createElement('canvas');
      const cellSize = 256;
      atlasCanvas.width = cellSize * 3;
      atlasCanvas.height = cellSize * 2;
      const ctx = atlasCanvas.getContext('2d');
      const layout = [
        { face: 'front',  col: 0, row: 0 },
        { face: 'back',   col: 1, row: 0 },
        { face: 'left',   col: 2, row: 0 },
        { face: 'right',  col: 0, row: 1 },
        { face: 'top',    col: 1, row: 1 },
        { face: 'bottom', col: 2, row: 1 }
      ];
      layout.forEach(({face, col, row}) => {
        ctx.drawImage(masks[face].canvas, col*cellSize, row*cellSize, cellSize, cellSize);
      });
      const texture = new THREE.CanvasTexture(atlasCanvas);
      texture.needsUpdate = true;
      return { texture, layout, cellSize, atlasCanvas };
    }

    function assignUVs(geometry, layout, cellSize) {
      const pos = geometry.attributes.position;
      const normals = geometry.attributes.normal;
      const uvArray = new Float32Array(pos.count * 2);
      const dirs = {
        front: new THREE.Vector3(0,0,1), back: new THREE.Vector3(0,0,-1),
        left: new THREE.Vector3(-1,0,0), right: new THREE.Vector3(1,0,0),
        top: new THREE.Vector3(0,1,0), bottom: new THREE.Vector3(0,-1,0)
      };
      const faceInfo = {};
      layout.forEach(l => { faceInfo[l.face] = l; });
      for (let i=0; i<pos.count; i++) {
        const n = new THREE.Vector3(normals.getX(i), normals.getY(i), normals.getZ(i)).normalize();
        let bestFace = 'front';
        let maxDot = -Infinity;
        faces.forEach(f => {
          const dot = n.dot(dirs[f]);
          if (dot > maxDot) { maxDot = dot; bestFace = f; }
        });
        const info = faceInfo[bestFace];
        const vert = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
        let u, v;
        switch(bestFace) {
          case 'front': u = vert.x+0.5; v = vert.y+0.5; break;
          case 'back':  u = 1-(vert.x+0.5); v = vert.y+0.5; break;
          case 'left':  u = 1-(vert.z+0.5); v = vert.y+0.5; break;
          case 'right': u = vert.z+0.5; v = vert.y+0.5; break;
          case 'top':   u = vert.x+0.5; v = 1-(vert.z+0.5); break;
          case 'bottom': u = vert.x+0.5; v = vert.z+0.5; break;
        }
        u = Math.max(0, Math.min(1, u));
        v = Math.max(0, Math.min(1, v));
        uvArray[i*2]   = (info.col + u) / 3;
        uvArray[i*2+1] = 1 - (info.row + v) / 2;
      }
      geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvArray, 2));
    }

    // ---------- 生成処理全体 ----------
    generateBtn.addEventListener('click', async () => {
      if (!faces.every(f => images[f])) return;
      uiPanel.style.display = 'none';
      progressContainer.style.display = 'block';
      updateProgress(0, '準備中...');

      const bgColor = bgColorPicker.value;
      const tolerance = parseInt(toleranceSlider.value);
      const density = parseInt(densitySelect.value);

      // マスク生成
      const masks = {};
      for (const f of faces) {
        updateProgress(10 + faces.indexOf(f)*5, `${f} マスク生成中`);
        await sleep(10);
        masks[f] = getMask(images[f], bgColor, tolerance);
      }

      // Visual Hull
      updateProgress(40, '立体形状生成中 (Voxel Carving)');
      await sleep(10);
      const grid = await generateVoxelGridAsync(masks, density);

      // メッシュ生成
      updateProgress(70, 'メッシュ生成中');
      const geometry = await simpleMeshFromGridAsync(grid, density);

      // テクスチャ
      updateProgress(90, 'テクスチャ生成中');
      const atlas = createTextureAtlas(masks);
      assignUVs(geometry, atlas.layout, atlas.cellSize);
      textureAtlas = atlas.texture;

      // スケーリング
      geometry.computeBoundingBox();
      const bbox = geometry.boundingBox;
      const size = new THREE.Vector3();
      bbox.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 300 / maxDim;
      geometry.scale(scale, scale, scale);
      geometry.computeBoundingBox();
      const minZ = geometry.boundingBox.min.z;
      geometry.translate(0, 0, -minZ);

      // プレビュー表示
      showPreview(geometry, atlas.texture);
      progressContainer.style.display = 'none';
    });

    // ---------- プレビュー ----------
    function showPreview(geometry, texture) {
      if (previewRenderer) {
        previewRenderer.dispose();
        document.body.removeChild(previewRenderer.domElement);
      }
      const previewScene = new THREE.Scene();
      previewScene.background = new THREE.Color(0x333333);
      const previewCamera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
      previewCamera.position.set(200, 200, 300);
      previewRenderer = new THREE.WebGLRenderer({ antialias: true });
      previewRenderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(previewRenderer.domElement);
      const previewControls = new OrbitControls(previewCamera, previewRenderer.domElement);

      const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.5, metalness: 0.1 });
      const mesh = new THREE.Mesh(geometry, mat);
      previewScene.add(mesh);
      previewScene.add(new THREE.DirectionalLight(0xffffff, 0.8));
      previewScene.add(new THREE.AmbientLight(0x444444));

      previewUi.style.display = 'block';
      document.getElementById('toggle-texture').onclick = () => {
        showTexture = !showTexture;
        mesh.material.map = showTexture ? texture : null;
        mesh.material.needsUpdate = true;
      };
      document.getElementById('save-obj').onclick = () => exportOBJ(geometry);
      document.getElementById('save-stl').onclick = () => exportSTL(geometry);
      document.getElementById('back-btn').onclick = () => {
        previewRenderer.dispose();
        document.body.removeChild(previewRenderer.domElement);
        previewRenderer = null;
        previewUi.style.display = 'none';
        uiPanel.style.display = 'block';
      };

      function animatePreview() {
        if (!previewRenderer) return;
        requestAnimationFrame(animatePreview);
        previewControls.update();
        previewRenderer.render(previewScene, previewCamera);
      }
      animatePreview();
    }

    // ---------- エクスポート ----------
    function exportOBJ(geometry) {
      const pos = geometry.attributes.position;
      const uv = geometry.attributes.uv;
      const norm = geometry.attributes.normal;
      const index = geometry.index;
      let obj = '# OBJ\n';
      for (let i=0; i<pos.count; i++) obj += `v ${pos.getX(i)} ${pos.getY(i)} ${pos.getZ(i)}\n`;
      for (let i=0; i<uv.count; i++) obj += `vt ${uv.getX(i)} ${uv.getY(i)}\n`;
      for (let i=0; i<norm.count; i++) obj += `vn ${norm.getX(i)} ${norm.getY(i)} ${norm.getZ(i)}\n`;
      for (let i=0; i<index.count; i+=3) {
        const a=index.getX(i)+1, b=index.getX(i+1)+1, c=index.getX(i+2)+1;
        obj += `f ${a}/${a}/${a} ${b}/${b}/${b} ${c}/${c}/${c}\n`;
      }
      download('model.obj', obj);
      const mtl = 'newmtl material0\nmap_Kd model_texture.png\n';
      download('model.mtl', mtl);
      // テクスチャ画像の保存
      const canvas = document.createElement('canvas');
      canvas.width = textureAtlas.image.width;
      canvas.height = textureAtlas.image.height;
      canvas.getContext('2d').drawImage(textureAtlas.image, 0, 0);
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'model_texture.png'; a.click();
      });
    }

    function exportSTL(geometry) {
      const pos = geometry.attributes.position;
      const index = geometry.index;
      let stl = 'solid model\n';
      for (let i=0; i<index.count; i+=3) {
        const a = new THREE.Vector3(pos.getX(index.getX(i)), pos.getY(index.getX(i)), pos.getZ(index.getX(i)));
        const b = new THREE.Vector3(pos.getX(index.getX(i+1)), pos.getY(index.getX(i+1)), pos.getZ(index.getX(i+1)));
        const c = new THREE.Vector3(pos.getX(index.getX(i+2)), pos.getY(index.getX(i+2)), pos.getZ(index.getX(i+2)));
        const normal = new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(b,a), new THREE.Vector3().subVectors(c,a)).normalize();
        stl += `facet normal ${normal.x} ${normal.y} ${normal.z}\n outer loop\n`;
        stl += `vertex ${a.x} ${a.y} ${a.z}\nvertex ${b.x} ${b.y} ${b.z}\nvertex ${c.x} ${c.y} ${c.z}\n`;
        stl += `endloop\nendfacet\n`;
      }
      stl += 'endsolid model\n';
      download('model.stl', stl);
    }

    function download(filename, text) {
      const blob = new Blob([text], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }
  </script>
</body>
